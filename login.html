<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Arial:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0c2d5e, #1e4a8c);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            border: 8px solid #0c2d5e;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .header {
            background-color: #0c2d5e;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logos {
            display: flex;
            gap: 10px;
        }

        .logo {
            height: 50px;
            background: white;
            padding: 5px;
            border-radius: 4px;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            flex: 1;
        }

        .form-area {
            padding: 40px 30px;
            background: white;
        }

        h2 {
            text-align: center;
            color: #0c2d5e;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #0c2d5e;
            font-weight: 600;
            font-size: 15px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #0c2d5e;
            border-radius: 4px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #1e4a8c;
            box-shadow: 0 0 8px rgba(30, 74, 140, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #0c2d5e;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .btn-login:hover {
            background-color: #1e4a8c;
        }

        .btn-back {
            background-color: #0c2d5e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: #0c2d5e;
            text-decoration: none;
            font-size: 14px;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logos">
                <!-- Você pode substituir pelos logos reais -->
                <img src="https://i.ibb.co/yHXJtCK/Adobe-Express-file.png" class="logo" alt="Logo Escola">
                <img src="https://i.ibb.co/ycvr6Kc2/brasao-cpmpr270.png" class="logo" alt="Logo Sistema">
            </div>
            <div class="title">Sistema de Ocorrências</div>
        </div>

        <!-- Form -->
        <div class="form-area">
            <h2>Entrar no Sistema</h2>
            
            <form>
                <div class="input-group">
                    <label for="usuario">E-mail @ Escola</label>
                    <input type="text" id="usuario" placeholder="Digite seu usuário ou e-mail" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn-login">ENTRAR</button>
            </form>

            <div class="links">
                <a href="#">Esqueci minha senha</a>
            </div>
        </div>

       
    </div>
</body>
</html>
